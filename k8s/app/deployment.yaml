apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifications-api
  namespace: notifications
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notifications-api
  template:
    metadata:
      labels:
        app: notifications-api
    spec:
      containers:
        - name: api
          image: your-registry/notifications-api:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: app-secrets
            - configMapRef:
                name: app-config
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              memory: 256Mi
