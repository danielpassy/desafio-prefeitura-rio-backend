services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: notifications
    ports:
      - "5432:5432"
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d notifications"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - ./.data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mock-idp:
    image: ghcr.io/navikt/mock-oauth2-server:2.1.10
    ports:
      - "15423:8080"
    environment:
      SERVER_PORT: "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/default/.well-known/openid-configuration || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8081:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://app:app@postgres:5432/notifications
      REDIS_ADDR: redis:6379
      JWT_JWKS_URL: http://mock-idp:8080/default/.well-known/jwks.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-idp:
        condition: service_healthy
    profiles:
      - app
