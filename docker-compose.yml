services:
  postgres:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: notifications
    ports:
      - "5432:5432"
    volumes:
      - ./.data/postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d notifications"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-init-test:
    image: postgres:18.3-alpine
    depends_on:
      - postgres
    environment:
      PGPASSWORD: app
    command:
      - sh
      - -ec
      - |
        until pg_isready -h postgres -U app -d notifications; do sleep 1; done
        createdb -h postgres -U app notifications_test || true
    profiles:
      - test

  redis:
    image: redis:8.6.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - ./.data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-test:
    image: redis:8.6.2-alpine
    volumes:
      - ./.data/redis-test:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mock-idp:
    image: ghcr.io/navikt/mock-oauth2-server:2.1.10
    ports:
      - "15423:8080"
    environment:
      SERVER_PORT: "8080"

  # Existe apenas para o app poder depender de service_completed_successfully.
  # Necessário porque mock-idp é distroless e não suporta healthcheck direto.
  mock-idp-probe:
    image: curlimages/curl:8.19.0
    depends_on:
      - mock-idp
    command:
      - "--retry"
      - "20"
      - "--retry-delay"
      - "2"
      - "--retry-all-errors"
      - "-sfo"
      - "/dev/null"
      - "http://mock-idp:8080/default/.well-known/openid-configuration"
    restart: "no"

  jaeger:
    image: jaegertracing/jaeger:2.17.0
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:16686/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8081:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://app:app@postgres:5432/notifications
      REDIS_ADDR: redis:6379
      JWT_JWKS_URL: http://mock-idp:8080/default/.well-known/jwks.json
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-idp-probe:
        condition: service_completed_successfully
    profiles:
      - app

  tests:
    build:
      context: .
      target: test
    environment:
      DATABASE_URL: postgres://app:app@postgres:5432/notifications_test
      REDIS_ADDR: redis-test:6379
      WEBHOOK_SECRET: test-webhook-secret
      CPF_KEY: test-cpf-key
      JWT_JWKS_URL: http://mock-idp:8080/default/.well-known/jwks.json
    depends_on:
      postgres:
        condition: service_healthy
      postgres-init-test:
        condition: service_completed_successfully
      redis-test:
        condition: service_healthy
      mock-idp-probe:
        condition: service_completed_successfully
    profiles:
      - test

  k6:
    image: grafana/k6:1.0.0
    volumes:
      - ./k6:/scripts
    environment:
      BASE_URL: http://app:8080
      IDP_URL: http://mock-idp:8080
    env_file:
      - .env
    command: run /scripts/${K6_SCRIPT:-smoke.js}
    profiles:
      - k6
